<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cha-Ching · Teen Wallet</title>
  <!-- Fonts loaded locally — no network dependency -->
  <style>
    @font-face { font-family: 'Caveat'; src: local('Caveat'); font-display: swap; }
  </style>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #1a3d1a 0%, #0d1f0d 60%, #0a1508 100%);
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    @keyframes sp-shimmer {
      0% {
        background-position: -60% 0
      }

      100% {
        background-position: 160% 0
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    * {
      scrollbar-width: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
